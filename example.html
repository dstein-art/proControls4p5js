<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: transparent; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script src="AnalogControls.js"></script>
<script src="CustomControls.js"></script>
<script>
const _q    = new URLSearchParams(location.search);
const CTRL  = _q.get('c') || 'slider';
const STYLE = _q.get('s') || 'stainless';
const LBL   = _q.get('lbl') || null;

const SIZES = {
  slider:    [100, 265],
  dial:      [170, 170],
  dialtheme: [140, 140],
  switch2:   [120, 130],
  switchn:   [130, 175],
  vumeter:   [90,  265],
  vudial:    [165, 165],
  xypad:     [260, 260],
  ledmeter:  [200, 110],
  selector:       [220, 100],
  selector_arrow: [220, 100],
  multislider:   [350, 265],
  multislider_h: [220, 230],
  multislider_h_spring: [220, 230],
  xypad_spring:  [260, 260],
  multidial:     [280, 150],
  multidial_v:   [150, 340],
  dialrubber:    [170, 170],
  dialgrooved:   [170, 170],
  dialpointer:   [170, 170],
  slider_wheel:  [100, 265],
  slider_button: [100, 265],
  gridpad_toggle:        [160, 155],
  gridpad_percent:       [160, 155],
  gridpad_colorselect:   [160, 155],
  adsr:            [260, 160],
  tagSelector:     [260, 130],
  rangeslider:     [110, 265],
  rangeslider_h:   [260, 80],
  panel:           [320, 240],
  panel_scroll:    [260, 200],
};

const [W, H] = SIZES[CTRL] || [300, 200];
let _inst = null;
let _lvl  = 0;

function runCode(code) {
  if (_inst) { _inst.remove(); _inst = null; }
  analogFullReset();
  _lvl = 0;

  window.setup = function () {
    createCanvas(W, H);
    AnalogStyle = STYLE;
    try { (new Function(code))(); }
    catch (e) { console.warn('[example]', e.message); }
  };

  window.draw = function () {
    analogBackground();
    // Drive animated display meters before they auto-draw this frame
    _lvl = lerp(_lvl, 0.5 + 0.4 * sin(frameCount * 0.035), 0.1);
    _lvl += random(-0.025, 0.025);
    _lvl = constrain(_lvl, 0, 1);
    for (const c of analogControls()) {
      const n = c.constructor.name;
      if (n === 'VUMeter' || n === 'VUDial' || n === 'LEDMeter') c.value = _lvl;
    }
    // Controls render themselves via the auto-draw post hook
  };

  _inst = new p5();
}

// Default code per control type — must assign to any variable; the library
// self-registers each control so the draw loop finds it via analogControls().
const label = LBL ? `'${LBL}'` : null;

const DEFAULTS = {
  slider: `\
const vol = new AnalogSlider({
  x: 28, y: 35,
  width: 44, height: 180,
  min: 0, max: 1, value: 0.8,
  label: ${label || "'VOLUME'"},
  readout: 'db',
  onChange: v => console.log(v),
});`,

  dial: `\
const freq = new Dial({
  x: 45, y: 35,
  size: 80,
  min: 0, max: 100, value: 65,
  label: ${label || "'LEVEL'"},
  readout: 'raw', decimals: 0,
  onChange: v => console.log(v),
});`,

  dialtheme: `\
const d = new Dial({
  x: 35, y: 27,
  size: 70,
  min: 0, max: 1, value: 0.65,
  label: ${label || `'${STYLE.toUpperCase().slice(0,5)}'`},
  readout: 'raw', decimals: 2,
});`,

  switch2: `\
const pwr = new AnalogSwitch({
  x: 36, y: 22,
  width: 48,
  states: ['OFF', 'ON'],
  label: ${label || "'POWER'"},
  state: 1,
  onChange: (i, s) => console.log(s),
});`,

  switchn: `\
const sel = new AnalogSwitch({
  x: 39, y: 18,
  width: 52,
  states: ['BLACK', 'STEEL', 'WHITE', 'BRUSH'],
  state: 0,
  label: ${label || "'STYLE'"},
  onChange: (i, s) => console.log(s),
});`,

  vumeter: `\
const vu = new VUMeter({
  x: 23, y: 35,
  width: 44, height: 180,
  label: ${label || "'L'"},
  showFader: false,
  segCount: 24, meterWidth: 12,
});
// .value is driven automatically in this preview`,

  vudial: `\
const vuDial = new VUDial({
  x: 43, y: 35,
  size: 80,
  label: ${label || "'VU'"},
  showKnob: false,
  segCount: 30,
});
// .value is driven automatically in this preview`,

  xypad: `\
const pad = new XYPad({
  x: 20, y: 22,
  width: 220, height: 200,
  minX: -1, maxX: 1,
  minY: -1, maxY: 1,
  valueX: 0, valueY: 0,
  label: ${label || "'XY'"},
  crosshairColor: '#ff6600',
  onChange: (vx, vy) => console.log(vx, vy),
});`,

  xypad_spring: `\
const pad = new XYPad({
  x: 20, y: 22,
  width: 220, height: 200,
  minX: -1, maxX: 1,
  minY: -1, maxY: 1,
  valueX: 0, valueY: 0,
  label: ${label || "'XY  (spring)'"},
  crosshairColor: '#ff6600',
  springBack: true,
  springDuration: 0.6,
  onChange: (vx, vy) => console.log(vx, vy),
});`,

  ledmeter: `\
const display = new LEDMeter({
  x: 20, y: 25,
  min: 0, max: 1,
  readout: 'db', decimals: 1, digits: 5,
  label: ${label || "'dB'"},
  ledColor: '#00ff88',
});
// .value is driven automatically in this preview`,

  selector: `\
const waveform = new Selector({
  x: 40, y: 22,
  options: ['SINE', 'SQUARE', 'SAW', 'TRI', 'NOISE'],
  state: 0,
  label: ${label || "'WAVE'"},
  onChange: (i, lbl) => console.log(lbl),
});`,

  selector_arrow: `\
const waveform = new Selector({
  x: 20, y: 22,
  width: 180,
  style: 'arrow',
  options: ['SINE', 'SQUARE', 'SAW', 'TRI', 'NOISE'],
  state: 0,
  label: ${label || "'WAVE'"},
  onChange: (i, lbl) => console.log(lbl),
});`,

  multislider: `\
const eq = new MultiSlider({
  x: 20, y: 35,
  height: 180,
  min: -12, max: 12,
  readout: 'raw', decimals: 1,
  label: ${label || "'EQ'"},
  sliders: {
    '60Hz':  0,
    '250Hz': 0,
    '2kHz':  0,
    '8kHz':  0,
  },
  onChange: v => console.log(v),
});`,

  multislider_h: `\
const eq = new MultiSlider({
  x: 20, y: 22,
  width: 180, height: 44,
  horizontal: true,
  min: -12, max: 12,
  readout: 'raw', decimals: 1,
  label: ${label || "'EQ'"},
  sliders: {
    '60Hz':  0,
    '250Hz': 0,
    '2kHz':  0,
    '8kHz':  0,
  },
  onChange: v => console.log(v),
});`,

  multislider_h_spring: `\
const eq = new MultiSlider({
  x: 20, y: 22,
  width: 180, height: 44,
  horizontal: true,
  min: -12, max: 12,
  readout: 'raw', decimals: 1,
  label: ${label || "'EQ'"},
  sliders: {
    '60Hz':  0,
    '250Hz': 0,
    '2kHz':  { value: 0, springBack: true, springDuration: 0.8 },
    '8kHz':  0,
  },
  onChange: v => console.log(v),
});`,

  multidial: `\
const tone = new MultiDial({
  x: 20, y: 20,
  size: 70,
  min: 0, max: 100,
  readout: 'raw', decimals: 0,
  label: ${label || "'TONE'"},
  dials: {
    'BASS':   50,
    'MID':    50,
    'TREBLE': 50,
  },
  onChange: v => console.log(v),
});`,

  multidial_v: `\
const tone = new MultiDial({
  x: 20, y: 20,
  size: 70,
  horizontal: false,
  min: 0, max: 100,
  readout: 'raw', decimals: 0,
  label: ${label || "'TONE'"},
  dials: {
    'BASS':   50,
    'MID':    50,
    'TREBLE': { value: 8000, min: 20, max: 20000, decimals: 0, style: 'pointer' },
  },
  onChange: v => console.log(v),
});`,

  dialrubber: `\
const vol = new Dial({
  x: 45, y: 35,
  size: 80,
  min: 0, max: 1, value: 0.65,
  label: ${label || "'VOLUME'"},
  readout: 'raw', decimals: 2,
  style: 'rubber',
  onChange: v => console.log(v),
});`,

  dialgrooved: `\
const freq = new Dial({
  x: 45, y: 35,
  size: 80,
  min: 0, max: 20000, value: 1000,
  label: ${label || "'FREQ'"},
  readout: 'raw', decimals: 0,
  style: 'grooved',
  onChange: v => console.log(v),
});`,

  dialpointer: `\
const pan = new Dial({
  x: 45, y: 35,
  size: 80,
  min: -1, max: 1, value: 0,
  label: ${label || "'PAN'"},
  readout: 'raw', decimals: 2,
  style: 'pointer',
  onChange: v => console.log(v),
});`,

  slider_wheel: `\
const pitch = new AnalogSlider({
  x: 28, y: 35,
  width: 44, height: 180,
  min: -1, max: 1, value: 0,
  style: 'wheel',
  label: ${label || "'PITCH'"},
  readout: 'raw', decimals: 2,
  springBack: true,
  onChange: v => console.log(v),
});`,

  slider_button: `\
const vol = new AnalogSlider({
  x: 28, y: 35,
  width: 44, height: 180,
  min: 0, max: 1, value: 0.75,
  style: 'button',
  label: ${label || "'LEVEL'"},
  readout: 'raw', decimals: 2,
  onChange: v => console.log(v),
});`,

  gridpad_toggle: `\
const seq = new GridPad({
  x: 20, y: 22,
  rows: 4, cols: 4,
  mode: 'toggle',
  cellSize: 20,
  hGroup: 2, vGroup: 2,
  label: ${label || "'PATTERN'"},
  onChange: v => console.log(v),
});`,

  gridpad_percent: `\
const vel = new GridPad({
  x: 20, y: 22,
  rows: 4, cols: 4,
  mode: 'percent',
  cellSize: 20,
  hGroup: 2, vGroup: 2,
  label: ${label || "'VELOCITY'"},
  onChange: v => console.log(v),
});`,

  gridpad_colorselect: `\
const seq = new GridPad({
  x: 20, y: 22,
  rows: 4, cols: 4,
  mode: 'colorselect',
  cellSize: 20,
  hGroup: 2, vGroup: 2,
  label: ${label || "'COLOR'"},
  options: [
    { color: '#222222', value: 'off'   },
    { color: '#cc3300', value: 'red'   },
    { color: '#0055cc', value: 'blue'  },
    { color: '#22aa44', value: 'green' },
  ],
  onChange: v => console.log(v),
});`,

  tagSelector: `\
const tags = new TagSelector({
  x: 20, y: 22,
  width: 220,
  words: ['REVERB', 'DELAY', 'CHORUS', 'FLANGER', 'PHASER',
          'DISTORT', 'COMPRESS', 'EQ', 'GATE', 'LIMITER'],
  label: ${label || "'FX'"},
  onChange: (sel, added, removed) => console.log(sel, added, removed),
});`,

  adsr: `\
const env = new ADSRDisplay({
  x: 20, y: 22,
  width: 220, height: 120,
  attack: 0.1, decay: 0.2,
  sustain: 0.7, release: 0.4,
  label: ${label || "'ENV'"},
});`,

  rangeslider: `\
const range = new RangeSlider({
  x: 28, y: 35,
  width: 54, height: 195,
  min: 0, max: 1,
  valueLow: 0.2, valueHigh: 0.8,
  label: ${label || "'RANGE'"},
  readout: 'raw', decimals: 2,
  onChange: (lo, hi) => console.log(lo, hi),
});`,

  rangeslider_h: `\
const range = new RangeSlider({
  x: 20, y: 18,
  width: 220, height: 44,
  min: 0, max: 1,
  valueLow: 0.2, valueHigh: 0.8,
  horizontal: true,
  label: ${label || "'RANGE'"},
  readout: 'raw', decimals: 2,
  onChange: (lo, hi) => console.log(lo, hi),
});`,

  panel: `\
const pnl = new Panel({
  x: 20, y: 18,
  width: 280, height: 200,
  label: ${label || "'PANEL'"},
});
pnl.add(new Dial({
  x: 20, y: 20,
  size: 70, min: 0, max: 100, value: 65,
  label: 'FREQ', readout: 'raw', decimals: 0,
}));
pnl.add(new AnalogSlider({
  x: 120, y: 20,
  width: 44, height: 150,
  min: 0, max: 1, value: 0.75,
  label: 'GAIN', readout: 'db',
}));
pnl.add(new AnalogSwitch({
  x: 190, y: 50,
  width: 52,
  states: ['OFF', 'ON'],
  state: 1,
  label: 'POWER',
}));`,

  panel_scroll: `\
const pnl = new Panel({
  x: 20, y: 18,
  width: 220, height: 160,
  label: ${label || "'SCROLL'"},
});
// Controls that extend beyond panel height — triggers scrollbar
for (let i = 0; i < 4; i++) {
  pnl.add(new Dial({
    x: 20 + i * 80, y: 20,
    size: 65, min: 0, max: 100, value: 40 + i * 15,
    label: ['BASS','MID','TREB','PRES'][i],
    readout: 'raw', decimals: 0,
  }));
  pnl.add(new Dial({
    x: 20 + i * 80, y: 120,
    size: 65, min: 0, max: 100, value: 60 - i * 10,
    label: ['VOL','PAN','SND','RET'][i],
    readout: 'raw', decimals: 0,
  }));
}`,
};

runCode(DEFAULTS[CTRL] || '');

// Accept code updates from the parent doc
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'run') runCode(e.data.code);
});
</script>
</body>
</html>
