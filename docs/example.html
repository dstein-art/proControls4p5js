  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; width: 100%; height: 100%; background: transparent; }
    canvas { display: block; }
    /* ── Mobile Menu ── */
    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      padding: 5px 8px;
      line-height: 1;
      align-items: center;
    }
    .nav-hamburger:hover { color: var(--accent); }

    /* ── Mobile Responsive ── */
    /* ── Mobile Responsive ── */
    @media (max-width: 900px) {
      nav {
        padding: 0 16px;
        gap: 4px;
      }

      nav > * {
        display: none !important;
      }

      nav > a:first-child {
        display: flex !important;
      }

      nav > a:nth-of-type(2) {
        display: block !important;
      }

      nav > .nav-hamburger {
        display: inline-flex !important;
      }
      }

      nav.mobile-menu-open {
        flex-direction: column;
        align-items: stretch;
        height: auto;
        padding: 12px 0;
        gap: 0;
      }

      nav.mobile-menu-open > .nav-hamburger {
        display: flex !important;
        padding: 12px 16px;
      }

      nav.mobile-menu-open > a {
        display: block !important;
        padding: 12px 16px;
        font-size: 15px;
      }

      nav.mobile-menu-open > .nav-group {
        display: block !important;
      }

      nav.mobile-menu-open > .nav-group > a:first-child {
        display: block;
        padding: 12px 16px;
        font-size: 15px;
        color: var(--muted);
        text-decoration: none;
        transition: color .15s, background .15s;
      }

      nav.mobile-menu-open > .nav-group > a:first-child:hover {
        color: var(--accent);
        background: #0077cc0a;
      }

      nav.mobile-menu-open .nav-submenu {
        display: none !important;
      }
    }

  </style>

const [W, H] = SIZES[CTRL] || [300, 200];
let _inst = null;
let _lvl  = 0;

function runCode(code) {
  if (_inst) { _inst.remove(); _inst = null; }
  proControlFullReset();
  _lvl = 0;

  // Two kinds of example:
  //   • setup-only (legacy): the snippet IS the body of setup(). We wrap it and
  //     run our own draw loop, which drives display meters and lets the controls
  //     auto-render. This is how most examples work.
  //   • full sketch: the snippet defines its own function setup() / draw(). We
  //     run those directly so a control's value can drive custom animated
  //     artwork in the example's own draw().
  if (/\bfunction\s+setup\b/.test(code)) {
    _runFullSketch(code);
  } else {
    _runSetupOnly(code);
  }

  _inst = new p5();
}

// Legacy: the snippet is the contents of setup(). Original preview behavior.
function _runSetupOnly(code) {
  window.setup = function () {
    createCanvas(W, H);
    ControlStyle = STYLE;
    try { (new Function(code))(); }
    catch (e) { console.warn('[example]', e.message); }
  };

  window.draw = function () {
    proControlBackground();
    // Drive animated display meters before they auto-draw this frame
    _lvl = lerp(_lvl, 0.5 + 0.4 * sin(frameCount * 0.035), 0.1);
    _lvl += random(-0.025, 0.025);
    _lvl = constrain(_lvl, 0, 1);
    for (const c of proControls()) {
      const n = c.constructor.name;
      if (n === 'VUMeter' || n === 'VUDial' || n === 'LEDMeter') c.value = _lvl;
      if (n === 'TimeGraphPanel') {
        const t = frameCount * 0.05;
        c._isObj
          ? c.push({ ch1: 0.5 + 0.45 * sin(t),        ch2: 0.5 + 0.45 * cos(t * 0.71),
                     ch3: 0.5 + 0.40 * sin(t * 1.30) })
          : c.push(_lvl);
      }
    }
    // Controls render themselves via the auto-draw post hook
  };
}

// Full sketch: the snippet defines its own setup()/draw(). Indirect eval runs
// it in global scope so the declarations become window.setup / window.draw;
// any top-level `let`/`const` are shared by both via closure.
function _runFullSketch(code) {
  window.setup = undefined;
  window.draw  = undefined;
  try { (0, eval)(code); }
  catch (e) { console.warn('[example]', e.message); }

  const userSetup = (typeof window.setup === 'function') ? window.setup : null;
  const userDraw  = (typeof window.draw  === 'function') ? window.draw  : null;

  window.setup = function () {
    ControlStyle = STYLE;
    if (userSetup) {
      try { userSetup(); }
      catch (e) { console.warn('[example]', e.message); }
    }
    // Fallback so the post-hook has a canvas even if the sketch forgot one.
    if (!document.querySelector('canvas')) createCanvas(W, H);
  };

  window.draw = function () {
    // push/pop so the sketch's transforms/styles don't leak into the control
    // auto-draw post-hook, which renders the controls after draw() returns.
    push();
    try {
      if (userDraw) userDraw();
      else proControlBackground();
    }
    catch (e) { console.warn('[example draw]', e.message); }
    pop();
  };
}
