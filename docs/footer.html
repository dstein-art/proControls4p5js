<!-- Footer — Last edited: 2026-06-09 — loaded from ../footer.json -->
<footer id="site-footer"></footer>
<script>
fetch('../footer.json').then(r=>r.json()).then(f=>{
  const sep=' · ';
  const links=f.links.map(l=>`<a href="${l.url}" target="_blank">${l.label}</a>`).join(sep);
  document.getElementById('site-footer').innerHTML=
    `<span>© ${new Date().getFullYear()} David Stein</span><span class="footer-promo">${f.credit}: ${links}</span>`;
});
</script>
